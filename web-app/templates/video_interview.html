<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Conference - Smart Mock Interviews</title>
    <style>
        body {
            background-image: url('https://www.interview-expert.com/beta-old/uploads/blogs/1692166939__Tips%20For%20Ai%20Job%20Interviews%20(1).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Dark overlay */
            z-index: -1;
        }
        .header {
            background-color: #1a252f;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: center;
        }
        .video-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .user-feed-container {
            background: rgba(26, 37, 47, 0.95);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 400px;
        }
        .user-feed {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #fff;
            background-color: #333;
        }
        .user-feed video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-name {
            margin-top: 10px;
            font-size: 16px;
            color: #2196F3;
        }
        .bot-feed-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(26, 37, 47, 0.95);
            padding: 5px;
            border-radius: 8px;
            width: 150px;
            height: 150px;
        }
        .bot-feed video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }
        .bot-feed .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #fff;
        }
        .controls-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
            background: rgba(26, 37, 47, 0.95);
            border-radius: 10px;
            width: 300px;
        }
        .control-btn {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background-color: #2196F3;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }
        .control-btn:hover {
            background-color: #1976D2;
        }
        .control-btn.off {
            background-color: #666;
        }
        .control-btn.end {
            background-color: #ff4444;
        }
        .control-btn.end:hover {
            background-color: #cc0000;
        }
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            .user-feed-container {
                width: 300px;
            }
            .user-feed {
                width: 150px;
                height: 150px;
            }
            .bot-feed-container {
                position: static;
                width: 120px;
                height: 120px;
                top: auto;
                right: auto;
                margin-top: 10px;
            }
            .controls-bar {
                width: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-title">MOCK INTERVIEW</span>
    </div>
    <div class="container">
        <div class="video-section">
            <div class="user-feed-container">
                <div class="user-feed">
                    <video id="user-feed" autoplay muted></video>
                </div>
                <div class="user-name">Steve</div>
            </div>
            <div class="bot-feed-container">
                <video id="bot-feed" autoplay loop>
                    <source src="https://www.sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <!-- Play icon overlay (hidden when video plays) -->
                <span class="play-icon">▶</span>
            </div>
        </div>
        <div class="controls-bar">
            <button class="control-btn" id="mute-btn">🔇</button>
            <button class="control-btn" id="video-btn">🎥</button>
            <button class="control-btn end" id="end-btn">📞</button>
        </div>
    </div>
    <script>
        const userFeed = document.getElementById('user-feed');
        const videoBtn = document.getElementById('video-btn');
        const muteBtn = document.getElementById('mute-btn');
        const endBtn = document.getElementById('end-btn');
        const botFeed = document.getElementById('bot-feed');
        let stream;

        // Get media stream
        async function startVideo() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                userFeed.srcObject = stream;
                videoBtn.style.backgroundColor = '#1976D2';
            } catch (err) {
                console.error('Error accessing media devices:', err);
                alert('Please allow camera and microphone access.');
            }
        }

        // Toggle video
        videoBtn.addEventListener('click', () => {
            if (videoBtn.style.backgroundColor !== 'rgb(25, 118, 210)') {
                startVideo();
            } else {
                stream.getTracks().forEach(track => track.stop());
                userFeed.srcObject = null;
                videoBtn.style.backgroundColor = '#2196F3';
            }
        });

        // Toggle audio (mute/unmute)
        muteBtn.addEventListener('click', () => {
            const audioTracks = stream?.getAudioTracks();
            if (audioTracks && audioTracks.length > 0) {
                audioTracks[0].enabled = !audioTracks[0].enabled;
                muteBtn.textContent = audioTracks[0].enabled ? '🔇' : '🔊';
                muteBtn.style.backgroundColor = audioTracks[0].enabled ? '#2196F3' : '#666';
            }
        });

        // End call
        endBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                userFeed.srcObject = null;
                videoBtn.style.backgroundColor = '#2196F3';
                muteBtn.textContent = '🔇';
                muteBtn.style.backgroundColor = '#2196F3';
            }
            window.location.href = '{{ url_for('home') }}';
        });

        // Start video on load
        startVideo();

        // Start bot video
        if (botFeed) {
            botFeed.play().catch(err => console.log('Bot video playback failed:', err));
            // Hide play icon when video plays
            botFeed.onplaying = () => document.querySelector('.play-icon').style.display = 'none';
        }
    </script>
</body>
</html>

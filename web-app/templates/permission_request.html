<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permission Request - Smart Mock Interviews</title>
    <style>
        body {
            background-image: url('https://www.interview-expert.com/beta-old/uploads/blogs/1692166939__Tips%20For%20Ai%20Job%20Interviews%20(1).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7); /* Dark overlay */
            z-index: -1;
        }
        .navbar {
            background-color: #1a252f;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-logo {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-right: 20px;
        }
        .navbar-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            margin-right: 20px;
            transition: color 0.3s;
        }
        .navbar-links a:hover {
            color: #2196F3;
        }
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .permission-box {
            max-width: 400px;
            padding: 30px;
            background: rgba(26, 37, 47, 0.95); /* Semi-transparent dark background */
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: left;
            animation: fadeIn 1s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #ffffff;
        }
        p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #e0e0e0;
        }
        .permission-options {
            margin-bottom: 20px;
        }
        .permission-options input[type="checkbox"] {
            margin-right: 10px;
            vertical-align: middle;
        }
        .permission-options label {
            font-size: 16px;
            color: #e0e0e0;
        }
        .allow-btn {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #2196F3;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            text-decoration: none;
        }
        .allow-btn:hover {
            background-color: #1976D2;
            transform: scale(1.03);
        }
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                align-items: flex-start;
                padding: 10px 20px;
            }
            .navbar-links {
                margin-top: 10px;
            }
            .navbar-links a {
                margin-right: 0;
                margin-bottom: 10px;
            }
            .permission-box {
                margin: 20px;
                padding: 20px;
            }
            h1 {
                font-size: 18px;
            }
            p {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">Smart Mock Interviews</div>
        <div class="navbar-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('info') }}">Info</a>
            <a href="#">Contact</a>
        </div>
    </nav>
    <div class="container">
        <div class="permission-box">
            <h1>Smart Mock Interviews wants to</h1>
            <p>Please allow Smart Mock Interviews to access your microphone and camera for seamless communication and interaction.</p>
            <form method="POST" action="{{ url_for('permission_request') }}">
                <div class="permission-options">
                    <input type="checkbox" id="mic_permission" name="mic_permission">
                    <label for="mic_permission">Use Your Microphone</label>
                </div>
                <div class="permission-options">
                    <input type="checkbox" id="cam_permission" name="cam_permission">
                    <label for="cam_permission">Use Your Camera</label>
                </div>
                <button type="submit" class="allow-btn">Allow Permission</button>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom background and glassmorphism */
        body {
            background: linear-gradient(135deg, #6b7280 0%, #1e3a8a 100%);
            position: relative;
            overflow: auto;
            font-family: 'Poppins', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border-radius: 1.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 48px rgba(0, 0, 0, 0.2);
        }
        /* Input and button effects */
        .input-field {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.8);
        }
        .input-field:focus {
            border-color: #1e40af;
            box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.25);
            background: white;
        }
        .btn-primary {
            background: linear-gradient(to right, #1e40af, #7c3aed);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(to right, #1e3a8a, #6d28d9);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(to right, #4b5563, #6b7280);
            transition: all 0.3s ease;
        }
        .btn-secondary:hover {
            background: linear-gradient(to right, #374151, #4b5563);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(75, 85, 99, 0.4);
        }
        /* Staggered fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-section {
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
        }
        .fade-in-section:nth-child(1) { animation-delay: 0.1s; }
        .fade-in-section:nth-child(2) { animation-delay: 0.2s; }
        .fade-in-section:nth-child(3) { animation-delay: 0.3s; }
        .fade-in-section:nth-child(4) { animation-delay: 0.4s; }
        .fade-in-section:nth-child(5) { animation-delay: 0.5s; }
        .fade-in-section:nth-child(6) { animation-delay: 0.6s; }
        /* Subtle background particles */
        .bg-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">
    <!-- Background Particles Canvas -->
    <canvas class="bg-particles"></canvas>

    <!-- Main Card -->
    <div class="glass-card max-w-4xl w-full p-8 sm:p-10 relative z-10">
        <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
            AI-Powered Resume Builder
        </h1>
        <form action="/build_resume" method="POST" class="space-y-8">
            <!-- Personal Information -->
            <div class="space-y-6 fade-in-section">
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">Personal Information</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" name="name" required class="input-field mt-1 block w-full focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" name="email" required class="input-field mt-1 block w-full focus:outline-none">
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-sm font-medium text-gray-700">Job Title</label>
                        <input type="text" name="job_title" required class="input-field mt-1 block w-full focus:outline-none">
                    </div>
                </div>
            </div>

            <!-- Template Selection -->
            <div class="space-y-4 fade-in-section">
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">Choose Template</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Template</label>
                    <select name="template" required class="input-field mt-1 block w-full focus:outline-none">
                        <option value="professional">Professional</option>
                        <option value="modern">Modern</option>
                        <option value="creative">Creative</option>
                    </select>
                </div>
            </div>

            <!-- Work Experience -->
            <div class="space-y-4 fade-in-section">
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">Work Experience</h2>
                <div id="experience" class="space-y-3">
                    <textarea name="experience[]" placeholder="Enter job description (e.g., Software Engineer at XYZ Corp)" rows="4" class="input-field block w-full focus:outline-none"></textarea>
                </div>
                <button type="button" onclick="addField('experience')" class="btn-secondary text-white px-4 py-2 rounded-lg text-sm font-medium">Add Experience</button>
            </div>

            <!-- Education -->
            <div class="space-y-4 fade-in-section">
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">Education</h2>
                <div id="education" class="space-y-3">
                    <input type="text" name="education[]" placeholder="Enter education details (e.g., B.S. Computer Science, ABC University)" class="input-field block w-full focus:outline-none">
                </div>
                <button type="button" onclick="addField('education')" class="btn-secondary text-white px-4 py-2 rounded-lg text-sm font-medium">Add Education</button>
            </div>

            <!-- Skills -->
            <div class="space-y-4 fade-in-section">
                <h2 class="text-xl sm:text-2xl font-semibold text-gray-800">Skills</h2>
                <div id="skills" class="space-y-3">
                    <input type="text" name="	let skills[]" placeholder="Enter a skill (e.g., Python, React)" class="input-field block w-full focus:outline-none">
                </div>
                <button type="button" onclick="addField('skills')" class="btn-secondary text-white px-4 py-2 rounded-lg text-sm font-medium">Add Skill</button>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-primary text-white w-full py-3 rounded-lg text-lg font-semibold fade-in-section">Generate Resume</button>
        </form>
    </div>

    <!-- JavaScript for Dynamic Fields and Particle Animation -->
    <script>
        function addField(section) {
            const container = document.getElementById(section);
            const inputType = section === 'experience' ? 'textarea' : 'input';
            const newField = document.createElement(inputType);
            newField.name = `${section}[]`;
            newField.placeholder = `Enter ${section} details (e.g., ${section === 'experience' ? 'Software Engineer at XYZ Corp' : section === 'education' ? 'B.S. Computer Science, ABC University' : 'Python, React'})`;
            newField.className = 'input-field block w-full focus:outline-none';
            if (inputType === 'textarea') {
                newField.rows = 4;
            }
            container.appendChild(newField);
        }

        // Particle Animation
        const canvas = document.querySelector('.bg-particles');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
                this.radius = Math.random() * 2 + 1;
                this.life = 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                this.life = Math.max(0, this.life - 0.002);
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life * 0.4})`;
                ctx.fill();
            }
        }

        let particles = [];
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 50) particles.push(new Particle());
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        animateParticles();
    </script>

</body>
</html>

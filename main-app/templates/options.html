<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose an Option</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Roboto:wght@300;400&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease, color 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }
        body.dark {
            color: #e0e0e0;
            background: linear-gradient(135deg, #1a2526 0%, #2c3e50 100%);
        }
        body.light {
            color: #333333;
            background: linear-gradient(135deg, #f5f5f5 0%, #dfe9f3 100%);
        }
        body.chrome-dark {
            color: #e0e0e0;
            background: linear-gradient(135deg, #202124 0%, #34373b 100%);
        }
        body.chrome-light {
            color: #202124;
            background: linear-gradient(135deg, #ffffff 0%, #e8ecef 100%);
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
        .navbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: background 0.5s ease;
            border-bottom: 1px solid;
        }
        body.dark .navbar {
            background: rgba(38, 52, 53, 0.9);
            border-color: #4a90e2;
            backdrop-filter: blur(8px);
        }
        body.light .navbar {
            background: rgba(255, 255, 255, 0.9);
            border-color: #e0e0e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }
        body.chrome-dark .navbar {
            background: rgba(48, 49, 52, 0.9);
            border-color: #8ab4f8;
            backdrop-filter: blur(8px);
        }
        body.chrome-light .navbar {
            background: rgba(255, 255, 255, 0.9);
            border-color: #dadce0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }
        .navbar .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        body.dark .navbar .logo {
            color: #4a90e2;
        }
        body.light .navbar .logo {
            color: #1a73e8;
        }
        body.chrome-dark .navbar .logo {
            color: #8ab4f8;
        }
        body.chrome-light .navbar .logo {
            color: #1a73e8;
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
        }
        .navbar .nav-links a {
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            font-weight: 400;
            transition: color 0.3s ease;
        }
        body.dark .navbar .nav-links a {
            color: #e0e0e0;
        }
        body.light .navbar .nav-links a {
            color: #333333;
        }
        body.chrome-dark .navbar .nav-links a {
            color: #8ab4f8;
        }
        body.chrome-light .navbar .nav-links a {
            color: #1a73e8;
        }
        body.dark .navbar .nav-links a:hover {
            color: #a1c4fd;
        }
        body.light .navbar .nav-links a:hover {
            color: #4285f4;
        }
        body.chrome-dark .navbar .nav-links a:hover {
            color: #a1c4fd;
        }
        body.chrome-light .navbar .nav-links a:hover {
            color: #4285f4;
        }
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 22px;
            margin-left: 20px;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        body.dark .theme-toggle {
            color: #e0e0e0;
        }
        body.light .theme-toggle {
            color: #333333;
        }
        body.chrome-dark .theme-toggle {
            color: #8ab4f8;
        }
        body.chrome-light .theme-toggle {
            color: #1a73e8;
        }
        .theme-toggle:hover {
            transform: rotate(20deg);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            padding-top: 140px;
        }
        .main-content h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
        }
        body.dark .main-content h1 {
            color: #e0e0e0;
        }
        body.light .main-content h1 {
            color: #333333;
        }
        body.chrome-dark .main-content h1 {
            color: #e0e0e0;
        }
        body.chrome-light .main-content h1 {
            color: #202124;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        .option-card {
            width: 100%;
            max-width: 380px;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            transition: box-shadow 0.3s ease, background 0.5s ease, transform 0.3s ease, border 0.3s ease;
            backdrop-filter: blur(10px);
            opacity: 0;
        }
        .option-card:nth-child(1) {
            animation: fadeIn 1.2s ease forwards 0.3s;
        }
        .option-card:nth-child(2) {
            animation: fadeIn 1.2s ease forwards 0.5s;
        }
        .option-card:nth-child(3) {
            animation: fadeIn 1.2s ease forwards 0.7s;
        }
        .option-card:nth-child(4) {
            animation: fadeIn 1.2s ease forwards 0.9s;
        }
        body.dark .option-card {
            background: rgba(38, 52, 53, 0.8);
            border: 1px solid #4a90e2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        body.light .option-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        body.chrome-dark .option-card {
            background: rgba(48, 49, 52, 0.8);
            border: 1px solid #8ab4f8;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        body.chrome-light .option-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #dadce0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        body.dark .option-card:hover {
            border: 1px solid transparent;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 20px rgba(74, 144, 226, 0.5);
            transform: scale(1.05) translateY(-2px);
        }
        body.light .option-card:hover {
            border: 1px solid transparent;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2), 0 0 20px rgba(26, 115, 232, 0.3);
            transform: scale(1.05) translateY(-2px);
        }
        body.chrome-dark .option-card:hover {
            border: 1px solid transparent;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4), 0 0 20px rgba(138, 180, 248, 0.5);
            transform: scale(1.05) translateY(-2px);
        }
        body.chrome-light .option-card:hover {
            border: 1px solid transparent;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2), 0 0 20px rgba(26, 115, 232, 0.3);
            transform: scale(1.05) translateY(-2px);
        }
        .option-card h5 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
            opacity: 0;
            animation: slideIn 0.8s ease forwards 0.2s;
        }
        body.dark .option-card h5 {
            color: #4a90e2;
        }
        body.light .option-card h5 {
            color: #1a73e8;
        }
        body.chrome-dark .option-card h5 {
            color: #8ab4f8;
        }
        body.chrome-light .option-card h5 {
            color: #1a73e8;
        }
        .option-card p {
            font-size: 16px;
            margin-bottom: 25px;
            opacity: 0;
            animation: slideIn 0.8s ease forwards 0.4s;
        }
        body.dark .option-card p {
            color: #b0b0b0;
        }
        body.light .option-card p {
            color: #666666;
        }
        body.chrome-dark .option-card p {
            color: #b0b0b0;
        }
        body.chrome-light .option-card p {
            color: #666666;
        }
        .option-card a {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: slideIn 0.8s ease forwards 0.6s;
        }
        body.dark .option-card a {
            background: linear-gradient(45deg, #4a90e2, #87ceeb);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }
        body.light .option-card a {
            background: linear-gradient(45deg, #1a73e8, #4285f4);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        body.chrome-dark .option-card a {
            background: linear-gradient(45deg, #8ab4f8, #a1c4fd);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }
        body.chrome-light .option-card a {
            background: linear-gradient(45deg, #1a73e8, #4285f4);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        body.dark .option-card a:hover {
            background: linear-gradient(45deg, #a1c4fd, #87ceeb);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(74, 144, 226, 0.5);
            transform: scale(1.05) translateY(-2px);
        }
        body.light .option-card a:hover {
            background: linear-gradient(45deg, #4285f4, #1a73e8);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2), 0 0 20px rgba(26, 115, 232, 0.3);
            transform: scale(1.05) translateY(-2px);
        }
        body.chrome-dark .option-card a:hover {
            background: linear-gradient(45deg, #a1c4fd, #8ab4f8);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(138, 180, 248, 0.5);
            transform: scale(1.05) translateY(-2px);
        }
        body.chrome-light .option-card a:hover {
            background: linear-gradient(45deg, #4285f4, #1a73e8);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2), 0 0 20px rgba(26, 115, 232, 0.3);
            transform: scale(1.05) translateY(-2px);
        }
        .option-card a .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        @media (max-width: 768px) {
            .main-content {
                padding: 50px 15px;
                padding-top: 100px;
            }
            .main-content h1 {
                font-size: 28px;
            }
            .option-card {
                max-width: 320px;
                padding: 25px;
            }
            .navbar .nav-links a {
                margin-left: 15px;
                font-size: 14px;
            }
            .navbar .logo {
                font-size: 22px;
            }
            .theme-toggle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body class="dark">
    <canvas id="particle-canvas"></canvas>
    <div class="navbar">
        <div class="logo">IntervuAI</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </div>
    <div class="main-content">
        <h1>Choose Your Interview Preparation Tool</h1>
        <div class="card-container">
            <div class="option-card">
                <h5>Resume Analysis</h5>
                <p>Get feedback and improve your existing resume.</p>
                <a href="{{ resume_analysis_url }}">Go to Resume Analysis</a>
            </div>
            <div class="option-card">
                <h5>Aptitude Test</h5>
                <p>Practice for Aptitude Test.</p>
                <a href="{{ aptitude_url }}">Go to Aptitude Test</a>
            </div>
            <div class="option-card">
                <h5>Mock Interview</h5>
                <p>Experience a simulated interview environment.</p>
                <a href="{{ interview_url }}">Go to Mock Interview</a>
            </div>
        </div>
    </div>
    <script>
        // Theme toggle functionality with four themes
        const themes = ['dark', 'light', 'chrome-dark', 'chrome-light'];
        let currentThemeIndex = 0;

        function toggleTheme() {
            const body = document.body;
            themes.forEach(theme => body.classList.remove(theme));
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            body.classList.add(newTheme);
            document.querySelector('.theme-toggle').textContent = 
                newTheme.includes('dark') ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'dark';
        currentThemeIndex = themes.indexOf(savedTheme);
        if (currentThemeIndex === -1) currentThemeIndex = 0;
        document.body.classList.add(themes[currentThemeIndex]);
        document.querySelector('.theme-toggle').textContent = 
            themes[currentThemeIndex].includes('dark') ? '☀️' : '🌙';

        // Particle animation
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 2;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * 0.6 - 0.3;
                this.opacity = 0;
                this.opacitySpeed = Math.random() * 0.015 + 0.01;
                this.fadeIn = true;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.fadeIn) {
                    this.opacity += this.opacitySpeed;
                    if (this.opacity >= 0.9) this.fadeIn = false;
                } else {
                    this.opacity -= this.opacitySpeed;
                    if (this.opacity <= 0) this.reset();
                }

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }

            draw() {
                const theme = document.body.classList;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                if (theme.contains('dark')) {
                    ctx.fillStyle = `rgba(74, 144, 226, ${this.opacity})`;
                    ctx.shadowColor = '#4a90e2';
                } else if (theme.contains('light')) {
                    ctx.fillStyle = `rgba(26, 115, 232, ${this.opacity})`;
                    ctx.shadowColor = '#1a73e8';
                } else if (theme.contains('chrome-dark')) {
                    ctx.fillStyle = `rgba(138, 180, 248, ${this.opacity})`;
                    ctx.shadowColor = '#8ab4f8';
                } else {
                    ctx.fillStyle = `rgba(26, 115, 232, ${this.opacity})`;
                    ctx.shadowColor = '#1a73e8';
                }
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        const particlesArray = [];
        const particleCount = window.innerWidth < 768 ? 40 : 80;
        for (let i = 0; i < particleCount; i++) {
            particlesArray.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        // Reset particles on resize
        window.addEventListener('resize', () => {
            particlesArray.forEach(particle => particle.reset());
        });

        // Ripple effect on button click
        document.querySelectorAll('.option-card a').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>

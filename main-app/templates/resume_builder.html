<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder - Smart Mock Interviews</title>
    <style>
        body {
            background-image: url('https://www.interview-expert.com/beta-old/uploads/blogs/1692166939__Tips%20For%20Ai%20Job%20Interviews%20(1).jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            color: #ffffff;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }
        .navbar {
            background-color: #1a252f;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-logo {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
        }
        .navbar-links {
            display: flex;
            gap: 20px;
        }
        .navbar-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }
        .navbar-links a:hover {
            color: #2196F3;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease;
            color: #333;
            text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }
        .container p {
            font-size: 16px;
            color: #444;
            line-height: 1.6;
        }
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
            .navbar-links {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">Smart Mock Interviews</div>
        <div class="navbar-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('info') }}">Info</a>
            <a href="#">Contact</a>
        </div>
    </nav>
    <div class="container">
        <h1>Resume Builder</h1>
        <p>This feature is under development. Our AI-powered resume builder will help you create a professional resume tailored to your career goals. Stay tuned!</p>
    </div>
</body>
</html>

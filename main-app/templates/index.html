<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Interview Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Roboto:wght@300;400&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.5s ease, color 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }
        body.dark {
            color: #e0e0e0;
            background: linear-gradient(135deg, #1a2526 0%, #2c3e50 100%);
        }
        body.light {
            color: #333333;
            background: linear-gradient(135deg, #f5f5f5 0%, #dfe9f3 100%);
        }
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
            pointer-events: none;
        }
        .navbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: background 0.5s ease;
            border-bottom: 1px solid;
        }
        body.dark .navbar {
            background: rgba(38, 52, 53, 0.9);
            border-color: #4a90e2;
            backdrop-filter: blur(8px);
        }
        body.light .navbar {
            background: rgba(255, 255, 255, 0.9);
            border-color: #e0e0e0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
        }
        .navbar .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        body.dark .navbar .logo {
            color: #4a90e2;
        }
        body.light .navbar .logo {
            color: #1a73e8;
        }
        .navbar .nav-links {
            display: flex;
            align-items: center;
        }
        .navbar .nav-links a {
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            font-weight: 400;
            transition: color 0.3s ease;
        }
        body.dark .navbar .nav-links a {
            color: #e0e0e0;
        }
        body.light .navbar .nav-links a {
            color: #333333;
        }
        body.dark .navbar .nav-links a:hover {
            color: #a1c4fd;
        }
        body.light .navbar .nav-links a:hover {
            color: #4285f4;
        }
        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-left: 20px;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
        }
        body.dark .theme-toggle {
            color: #e0e0e0;
            border-color: #4a90e2;
        }
        body.light .theme-toggle {
            color: #333333;
            border-color: #1a73e8;
        }
        body.dark .theme-toggle:hover {
            background: rgba(74, 144, 226, 0.2);
            color: #a1c4fd;
            transform: scale(1.05);
        }
        body.light .theme-toggle:hover {
            background: rgba(26, 115, 232, 0.2);
            color: #4285f4;
            transform: scale(1.05);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            padding-top: 140px;
        }
        .main-content h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards;
        }
        body.dark .main-content h1 {
            color: #e0e0e0;
        }
        body.light .main-content h1 {
            color: #333333;
        }
        .form-container {
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            transition: background 0.5s ease, box-shadow 0.5s ease, border 0.3s ease;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 0.3s;
        }
        body.dark .form-container {
            background: rgba(38, 52, 53, 0.8);
            border: 1px solid #4a90e2;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        body.light .form-container {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #e0e0e0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        body.dark .form-container:hover {
            border: 1px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(74, 144, 226, 0.5);
        }
        body.light .form-container:hover {
            border: 1px solid transparent;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1), 0 0 20px rgba(26, 115, 232, 0.3);
        }
        .form-group {
            margin-bottom: 25px;
            opacity: 0;
            animation: slideIn 0.8s ease forwards;
        }
        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.7s; }
        .form-group:nth-child(3) { animation-delay: 0.9s; }
        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 8px;
        }
        body.dark .form-group label {
            color: #4a90e2;
        }
        body.light .form-group label {
            color: #1a73e8;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid;
            transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
        }
        body.dark .form-group input,
        body.dark .form-group select {
            background: #1a2526;
            color: #e0e0e0;
            border-color: #4a90e2;
        }
        body.light .form-group input,
        body.light .form-group select {
            background: #f5f5f5;
            color: #333333;
            border-color: #e0e0e0;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
        }
        body.dark .form-group input:focus,
        body.dark .form-group select:focus {
            border-color: #a1c4fd;
            box-shadow: 0 0 8px rgba(74, 144, 226, 0.3);
        }
        body.light .form-group input:focus,
        body.light .form-group select:focus {
            border-color: #4285f4;
            box-shadow: 0 0 8px rgba(26, 115, 232, 0.2);
        }
        .submit-button {
            padding: 14px 35px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            width: 100%;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 1.2s ease forwards 1.1s;
        }
        body.dark .submit-button {
            background: linear-gradient(45deg, #4a90e2, #87ceeb);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
        }
        body.light .submit-button {
            background: linear-gradient(45deg, #1a73e8, #4285f4);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.1);
        }
        body.dark .submit-button:hover {
            background: linear-gradient(45deg, #a1c4fd, #87ceeb);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(74, 144, 226, 0.5);
            transform: scale(1.05) translateY(-2px);
        }
        body.light .submit-button:hover {
            background: linear-gradient(45deg, #4285f4, #1a73e8);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2), 0 0 20px rgba(26, 115, 232, 0.3);
            transform: scale(1.05) translateY(-2px);
        }
        .submit-button .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        @media (max-width: 768px) {
            .main-content {
                padding: 50px 15px;
                padding-top: 100px;
            }
            .main-content h1 {
                font-size: 28px;
            }
            .form-container {
                max-width: 320px;
                padding: 25px;
            }
            .navbar .nav-links a {
                margin-left: 15px;
                font-size: 14px;
            }
            .navbar .logo {
                font-size: 22px;
            }
            .theme-toggle {
                font-size: 12px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body class="dark">
    <canvas id="particle-canvas"></canvas>
    <div class="navbar">
        <div class="logo">IntervuAI</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Home</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">Light</button>
        </div>
    </div>
    <div class="main-content">
        <h1>Welcome to the Virtual Interview Assistant</h1>
        <div class="form-container">
            <form method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <button type="submit" class="submit-button">Next</button>
            </form>
        </div>
    </div>
    <script>
        // Theme toggle functionality with two themes (dark and light)
        const themes = ['dark', 'light'];
        let currentThemeIndex = 0;

        function toggleTheme() {
            const body = document.body;
            themes.forEach(theme => body.classList.remove(theme));
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            const newTheme = themes[currentThemeIndex];
            body.classList.add(newTheme);
            document.querySelector('.theme-toggle').textContent = 
                newTheme === 'dark' ? 'Light' : 'Dark';
            localStorage.setItem('theme', newTheme);
        }

        // Load theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'dark';
        currentThemeIndex = themes.indexOf(savedTheme);
        if (currentThemeIndex === -1) currentThemeIndex = 0;
        document.body.classList.add(themes[currentThemeIndex]);
        document.querySelector('.theme-toggle').textContent = 
            themes[currentThemeIndex] === 'dark' ? 'Light' : 'Dark';

        // Particle animation
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 2;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.speedY = Math.random() * 0.6 - 0.3;
                this.opacity = 0;
                this.opacitySpeed = Math.random() * 0.015 + 0.01;
                this.fadeIn = true;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.fadeIn) {
                    this.opacity += this.opacitySpeed;
                    if (this.opacity >= 0.9) this.fadeIn = false;
                } else {
                    this.opacity -= this.opacitySpeed;
                    if (this.opacity <= 0) this.reset();
                }

                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }

            draw() {
                const theme = document.body.classList;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                if (theme.contains('dark')) {
                    ctx.fillStyle = `rgba(74, 144, 226, ${this.opacity})`;
                    ctx.shadowColor = '#4a90e2';
                } else {
                    ctx.fillStyle = `rgba(26, 115, 232, ${this.opacity})`;
                    ctx.shadowColor = '#1a73e8';
                }
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        const particlesArray = [];
        const particleCount = window.innerWidth < 768 ? 40 : 80;
        for (let i = 0; i < particleCount; i++) {
            particlesArray.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        // Reset particles on resize
        window.addEventListener('resize', () => {
            particlesArray.forEach(particle => particle.reset());
        });

        // Ripple effect on button click
        document.querySelectorAll('.submit-button').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
    </script>
</body>
</html>

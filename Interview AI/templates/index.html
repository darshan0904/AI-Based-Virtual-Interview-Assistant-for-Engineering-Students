<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mock Interview</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <h1>AI Mock Interview</h1>
    <img id="avatar" src="https://xai-artifact-1.s3.us-west-2.amazonaws.com/artifact_images/artifact_1725136188589.png" alt="AI Avatar">
    
    <form method="POST" action="/">
        <div class="selection">
            <label for="domain">Domain:</label>
            <select name="domain" id="domain">
                <option value="Software Engineering" {% if domain == "Software Engineering" %}selected{% endif %}>Software Engineering</option>
            </select>
            <label for="role">Role:</label>
            <select name="role" id="role">
                <option value="Backend Developer" {% if role == "Backend Developer" %}selected{% endif %}>Backend Developer</option>
            </select>
        </div>
        <div id="question">{{ question }}</div>
        <textarea id="userInput" name="answer" placeholder="Type your answer here..." rows="5"></textarea>
        <input type="hidden" name="question_index" value="{{ question_index }}">
        <br>
        <button id="submitBtn" type="submit">Submit Answer</button>
    </form>
    {% if feedback %}
        <div id="feedback">{{ feedback }}</div>
        <div id="score">Your Score: {{ score }}/100</div>
    {% endif %}
    {% if error %}
        <div id="error">{{ error }}</div>
    {% endif %}
</body>
</html>

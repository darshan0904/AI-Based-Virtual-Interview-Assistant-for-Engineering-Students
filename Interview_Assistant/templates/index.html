<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Assistant</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="form-bg">
    <div id="form-container" class="container glassmorphism">
        <form id="interview-form" style="display: grid; gap: 24px;">
            <div class="fade-in-slide-up" style="animation-delay: 0.1s; position: relative;">
                <input type="text" id="name" placeholder=" " style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
                <label for="name" class="floating-label">Full Name</label>
            </div>
            <div class="fade-in-slide-up" style="animation-delay: 0.2s; position: relative;">
                <select id="engineering" style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
                    <option value="" disabled selected>Select Engineering Field</option>
                    {% for field in engineering_fields %}
                        <option value="{{ field }}">{{ field }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="fade-in-slide-up" style="animation-delay: 0.3s; position: relative;">
                <select id="domain" style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
                    <option value="" disabled selected>Select Domain</option>
                </select>
                <input type="text" id="custom-domain" placeholder="Custom Domain" class="hidden" style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
            </div>
            <div class="fade-in-slide-up" style="animation-delay: 0.4s; position: relative;">
                <select id="role" style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
                    <option value="" disabled selected>Select Role</option>
                </select>
                <input type="text" id="custom-role" placeholder="Custom Role" class="hidden" style="width: 100%; padding: 16px; background: transparent; border: 1px solid #d1d5db; border-radius: 8px; outline: none;">
            </div>
            <div class="fade-in-slide-up" style="animation-delay: 0.5s; position: relative;">
                <input type="file" id="resume" accept=".pdf,.docx" class="hidden">
                <label for="resume" id="resume-label" class="upload-label">
                    Upload Resume (Optional)
                    <svg style="width: 24px; height: 24px; margin-left: 8px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                </label>
            </div>
            <button type="submit" id="start-interview-btn" class="start-btn fade-in-slide-up" style="animation-delay: 0.6s;">Start Interview</button>
        </form>
    </div>

    <div id="loading-container" class="hidden fixed-container loading-bg">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Preparing your interview...</p>
        </div>
    </div>

    <div id="transition-container" class="hidden fixed-container transition-bg">
        <p class="transition-text">Please wait...</p>
    </div>

    <div id="interview-container" class="hidden full-width full-height interview-bg">
        <div class="gif-container">
            <img id="ai-animation" src="/static/talking.gif" alt="AI Animation">
        </div>
        <div id="webcam-feed" class="webcam-feed">
            <video id="user-video" autoplay style="width: 100%; height: 100%; object-fit: contain;"></video>
        </div>
        <div class="button-bar">
            <button id="repeat-btn" class="fab bg-indigo text-white">Repeat</button>
            <div id="transcript-bar" class="youtube-captions"></div>
            <button id="next-btn" class="fab bg-indigo text-white">Next</button>
        </div>
    </div>

    <div id="thank-you-container" class="hidden thankyou-bg">
        <div class="container glassmorphism text-center">
            <h2 class="thank-you-title">Thank You!</h2>
            <p class="thank-you-text">"Success is not the absence of obstacles, but the courage to push through them."</p>
            <a href="http://localhost:9394/generate_evaluation/{{ sessionId }}" class="start-btn fade-in-slide-up" style="animation-delay: 0.7s; display: inline-block; margin-top: 20px;">Generate Evaluation</a>
        </div>
    </div>

    <script>
        const TALKING_GIF = "/static/talking.gif";
        const LISTENING_GIF = "/static/listening.gif";
        let sessionId, questions = [], currentQuestion = 0;
        let mediaRecorderAudio, mediaRecorderVideo;
        let allAudioChunks = [], allVideoChunks = [];
        let aiAnimation = document.getElementById('ai-animation');
        let transcriptBar = document.getElementById('transcript-bar');
        let userVideo = document.getElementById('user-video');
        let webcamFeed = document.getElementById('webcam-feed');
        let recognition;
        let questionAudio;
        let username, engineering, domain, role;
        let transcriptContent = "";
        let isAISmall = false;
        let isRecording = false;
        let userAnswer = "";
        let aiAnswer = "";
        let subtitleInterval;

        function hideAllContainers() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('loading-container').classList.add('hidden');
            document.getElementById('transition-container').classList.add('hidden');
            document.getElementById('interview-container').classList.add('hidden');
            document.getElementById('thank-you-container').classList.add('hidden');
            document.body.classList.remove('form-bg', 'loading-bg', 'transition-bg', 'interview-bg', 'thankyou-bg');
        }

        function showContainer(containerId, bgClass) {
            hideAllContainers();
            document.getElementById(containerId).classList.remove('hidden');
            document.body.classList.add(bgClass);
        }

        showContainer('form-container', 'form-bg');

        function initWebcam() {
            navigator.mediaDevices.getUserMedia({
                video: true,
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 44100, // Standard for WAV compatibility
                    channelCount: 1
                }
            })
            .then(stream => {
                userVideo.srcObject = stream;

                const audioStream = new MediaStream(stream.getAudioTracks());
                mediaRecorderAudio = new MediaRecorder(audioStream, { 
                    mimeType: 'audio/webm;codecs=opus',
                    audioBitsPerSecond: 128000 // Higher bitrate for quality
                });
                mediaRecorderAudio.ondataavailable = e => {
                    if (e.data.size > 0) {
                        if (!allAudioChunks[currentQuestion]) allAudioChunks[currentQuestion] = [];
                        allAudioChunks[currentQuestion].push(e.data);
                        console.log(`Audio chunk captured for question ${currentQuestion + 1}, size: ${e.data.size}, type: ${e.data.type}`);
                    } else {
                        console.warn(`Empty audio chunk for question ${currentQuestion + 1}`);
                    }
                };
                mediaRecorderAudio.onstop = () => {
                    console.log(`Audio recording stopped for question ${currentQuestion + 1}, chunks: ${allAudioChunks[currentQuestion]?.length || 0}`);
                };
                mediaRecorderAudio.onerror = (e) => {
                    console.error(`MediaRecorder audio error for question ${currentQuestion + 1}:`, e);
                };

                const videoStream = new MediaStream(stream.getVideoTracks());
                mediaRecorderVideo = new MediaRecorder(videoStream, { 
                    mimeType: 'video/webm',
                    videoBitsPerSecond: 2500000
                });
                mediaRecorderVideo.ondataavailable = e => {
                    if (e.data.size > 0) {
                        if (!allVideoChunks[currentQuestion]) allVideoChunks[currentQuestion] = [];
                        allVideoChunks[currentQuestion].push(e.data);
                        console.log(`Video chunk captured for question ${currentQuestion + 1}, size: ${e.data.size}`);
                    }
                };
                mediaRecorderVideo.onstop = () => {
                    console.log(`Video recording stopped for question ${currentQuestion + 1}`);
                };
            })
            .catch(err => {
                console.error("Webcam access failed:", err);
                alert("Please allow webcam and microphone access.");
                mediaRecorderAudio = null;
                mediaRecorderVideo = null;
            });
        }

        function initSpeechRecognition() {
            try {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;
                recognition.onstart = () => {
                    console.log("Speech recognition started for question", currentQuestion + 1);
                    isRecording = true;
                    userAnswer = "";
                    transcriptBar.textContent = "";
                };
                recognition.onresult = event => {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    userAnswer = (finalTranscript + interimTranscript).trim() || "No response recorded";
                    transcriptBar.textContent = userAnswer;
                    console.log(`Speech recognition result for question ${currentQuestion + 1} - Final:`, finalTranscript, "Interim:", interimTranscript);
                };
                recognition.onerror = event => {
                    console.error("Speech recognition error for question", currentQuestion + 1, ":", event.error);
                    isRecording = false;
                    if (event.error === "no-speech") {
                        console.log("No speech detected, retrying...");
                        setTimeout(() => {
                            if (recognition && !isRecording) recognition.start();
                        }, 1000);
                    }
                    if (!userAnswer) {
                        userAnswer = "Speech recognition failed";
                        transcriptBar.textContent = userAnswer;
                    }
                };
                recognition.onend = () => {
                    console.log("Speech recognition ended for question", currentQuestion + 1);
                    isRecording = false;
                    if (!userAnswer) {
                        userAnswer = "No response recorded";
                        transcriptBar.textContent = userAnswer;
                    }
                };
            } catch (err) {
                console.error("Speech recognition initialization failed:", err);
                recognition = null;
            }
        }

        function startDynamicSubtitles(text) {
            if (subtitleInterval) clearInterval(subtitleInterval);
            const maxLength = 50;
            const words = text.split(' ');
            let chunks = [];
            let currentChunk = '';

            for (let word of words) {
                if ((currentChunk + word).length <= maxLength) {
                    currentChunk += (currentChunk ? ' ' : '') + word;
                } else {
                    if (currentChunk) chunks.push(currentChunk);
                    currentChunk = word;
                }
            }
            if (currentChunk) chunks.push(currentChunk);

            let index = 0;
            transcriptBar.textContent = chunks[0] || text;
            if (chunks.length > 1) {
                subtitleInterval = setInterval(() => {
                    index = (index + 1) % chunks.length;
                    transcriptBar.textContent = chunks[index];
                }, 3000);
            }
        }

        webcamFeed.addEventListener('click', () => {
            if (!isAISmall) {
                aiAnimation.src = questionAudio && !questionAudio.ended ? TALKING_GIF : LISTENING_GIF;
                aiAnimation.style.width = '128px';
                aiAnimation.style.height = '96px';
                aiAnimation.style.objectFit = 'contain';
                userVideo.style.width = '100%';
                userVideo.style.height = '100%';
                userVideo.style.objectFit = 'contain';
                webcamFeed.appendChild(aiAnimation);
                document.getElementById('interview-container').insertBefore(userVideo, webcamFeed);
            } else {
                aiAnimation.src = questionAudio && !questionAudio.ended ? TALKING_GIF : LISTENING_GIF;
                aiAnimation.style.width = '100%';
                aiAnimation.style.height = '100%';
                aiAnimation.style.objectFit = 'contain';
                userVideo.style.width = '100%';
                userVideo.style.height = '100%';
                userVideo.style.objectFit = 'contain';
                webcamFeed.appendChild(userVideo);
                document.getElementById('interview-container').insertBefore(aiAnimation, webcamFeed);
            }
            isAISmall = !isAISmall;
        });

        document.getElementById('resume').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const resumeLabel = document.getElementById('resume-label');
            if (file) {
                resumeLabel.textContent = `Resume: ${file.name}`;
                resumeLabel.classList.remove('bg-indigo');
                resumeLabel.classList.add('bg-green');
            } else {
                resumeLabel.textContent = 'Upload Resume (Optional)';
                resumeLabel.classList.remove('bg-green');
                resumeLabel.classList.add('bg-indigo');
            }
        });

        document.getElementById('engineering').addEventListener('change', (e) => {
            const engineering = e.target.value;
            const domainSelect = document.getElementById('domain');
            const customDomain = document.getElementById('custom-domain');
            const roleSelect = document.getElementById('role');
            const customRole = document.getElementById('custom-role');

            fetch('/get_domains', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ engineering })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Domains received:', data.domains);
                domainSelect.innerHTML = '<option value="" disabled selected>Select Domain</option>' +
                    (data.domains && data.domains.length > 0
                        ? data.domains.map(domain => `<option value="${domain}">${domain}</option>`).join('')
                        : '<option value="" disabled>No domains available</option>') +
                    '<option value="custom">Custom Domain</option>';
                customDomain.classList.add('hidden');
                roleSelect.innerHTML = '<option value="" disabled selected>Select Role</option>';
                customRole.classList.add('hidden');
            })
            .catch(err => {
                console.error("Error fetching domains:", err);
                alert("Failed to load domains. Please try again.");
                domainSelect.innerHTML = '<option value="" disabled selected>Error loading domains</option>';
            });
        });

        document.getElementById('domain').addEventListener('change', (e) => {
            const domain = e.target.value;
            const roleSelect = document.getElementById('role');
            const customDomain = document.getElementById('custom-domain');
            const customRole = document.getElementById('custom-role');

            if (domain === 'custom') {
                customDomain.classList.remove('hidden');
                roleSelect.innerHTML = '<option value="custom" selected>Custom Role</option>';
                customRole.classList.remove('hidden');
            } else {
                customDomain.classList.add('hidden');
                customRole.classList.add('hidden');
                fetch('/get_roles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! Status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Roles received:', data.roles);
                    roleSelect.innerHTML = '<option value="" disabled selected>Select Role</option>' +
                        (data.roles && data.roles.length > 0
                            ? data.roles.map(role => `<option value="${role}">${role}</option>`).join('')
                            : '<option value="" disabled>No roles available</option>') +
                        '<option value="custom">Custom Role</option>';
                })
                .catch(err => {
                    console.error("Error fetching roles:", err);
                    alert("Failed to load roles. Please try again.");
                    roleSelect.innerHTML = '<option value="" disabled selected>Error loading roles</option>';
                });
            }
        });

        document.getElementById('role').addEventListener('change', (e) => {
            const customRole = document.getElementById('custom-role');
            if (e.target.value === 'custom') {
                customRole.classList.remove('hidden');
            } else {
                customRole.classList.add('hidden');
            }
        });

        document.getElementById('interview-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showContainer('loading-container', 'loading-bg');

            const formData = new FormData();
            username = document.getElementById('name').value;
            if (!username) {
                alert("Name is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            formData.append('name', username);
            engineering = document.getElementById('engineering').value;
            if (!engineering) {
                alert("Engineering field is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            formData.append('engineering', engineering);
            const domainSelect = document.getElementById('domain').value;
            if (!domainSelect) {
                alert("Domain is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            domain = domainSelect === 'custom' ? document.getElementById('custom-domain').value : domainSelect;
            if (domainSelect === 'custom' && !domain) {
                alert("Custom domain is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            formData.append('domain', domain);
            const roleSelect = document.getElementById('role').value;
            if (!roleSelect) {
                alert("Role is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            role = roleSelect === 'custom' ? document.getElementById('custom-role').value : roleSelect;
            if (roleSelect === 'custom' && !role) {
                alert("Custom role is required");
                showContainer('form-container', 'form-bg');
                return;
            }

            formData.append('role', role);
            const resume = document.getElementById('resume').files[0];
            if (resume) {
                formData.append('resume', resume);
            }

            fetch('/start_interview', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                sessionId = data.session_id;
                transcriptContent = `\t\t\t${username}\n\n`;
                allAudioChunks = [];
                allVideoChunks = [];
                return generateQuestions();
            })
            .then(() => {
                showContainer('interview-container', 'interview-bg');
                initWebcam();
                initSpeechRecognition();
                loadQuestion();
            })
            .catch(err => {
                console.error("Error starting interview:", err.message);
                alert("Failed to start interview: " + err.message);
                showContainer('form-container', 'form-bg');
            });
        });

        function generateQuestions() {
            return fetch(`/generate_questions/${sessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: domain, role: role, has_resume: !!document.getElementById('resume').files[0] })
            })
            .then(response => response.json())
            .then(data => {
                questions = data.questions.filter(q => !q.toLowerCase().includes("here are") && !q.toLowerCase().includes("questions") && !q.toLowerCase().includes("why"));
                console.log("Questions loaded:", questions);
                for (let i = 0; i < 15; i++) {
                    allAudioChunks[i] = allAudioChunks[i] || [];
                    allVideoChunks[i] = allVideoChunks[i] || [];
                }
            })
            .catch(err => {
                console.error("Error generating questions:", err);
                throw err;
            });
        }

        function loadQuestion() {
            if (currentQuestion >= questions.length || currentQuestion >= 15) {
                saveAllRecordings();
                showContainer('thank-you-container', 'thankyou-bg');
                if (recognition) recognition.stop();
                if (mediaRecorderAudio) mediaRecorderAudio.stop();
                if (mediaRecorderVideo) mediaRecorderVideo.stop();
                if (subtitleInterval) clearInterval(subtitleInterval);
                return;
            }

            const questionText = questions[currentQuestion];
            console.log(`Loading question ${currentQuestion + 1}/${questions.length}:`, questionText);
            aiAnimation.src = TALKING_GIF;
            const questionTextForAudio = questionText.replace(/[*"().,:;?!-]/g, ' ').trim();
            startDynamicSubtitles(questionText);

            if (questionAudio) {
                questionAudio.pause();
                questionAudio.currentTime = 0;
            }

            fetch(`/next_question/${sessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: questionTextForAudio })
            })
            .then(response => response.json())
            .then(data => {
                if (data.end) {
                    saveAllRecordings();
                    showContainer('thank-you-container', 'thankyou-bg');
                    if (recognition) recognition.stop();
                    if (mediaRecorderAudio) mediaRecorderAudio.stop();
                    if (mediaRecorderVideo) mediaRecorderVideo.stop();
                    if (subtitleInterval) clearInterval(subtitleInterval);
                    return;
                }

                aiAnswer = data.ai_answer;

                console.log("Audio URL:", data.audio);
                questionAudio = new Audio();
                questionAudio.src = data.audio;
                questionAudio.type = "audio/wav";
                setTimeout(() => {
                    questionAudio.play().catch(err => {
                        console.error("Audio playback failed:", err);
                        alert("Audio playback failed: " + err.message + ". Please ensure your browser allows audio and supports WAV format.");
                    });
                }, 500);

                questionAudio.onended = () => {
                    aiAnimation.src = LISTENING_GIF;
                    if (recognition) recognition.start();
                    if (mediaRecorderAudio) mediaRecorderAudio.start();
                    if (mediaRecorderVideo) mediaRecorderVideo.start();
                };
            })
            .catch(err => {
                console.error("Error loading question:", err);
            });
        }

        document.getElementById('repeat-btn').addEventListener('click', () => {
            if (recognition) recognition.stop();
            if (mediaRecorderAudio && mediaRecorderAudio.state === "recording") {
                mediaRecorderAudio.stop();
            }
            if (mediaRecorderVideo && mediaRecorderVideo.state === "recording") {
                mediaRecorderVideo.stop();
            }
            aiAnimation.src = TALKING_GIF;
            const questionText = questions[currentQuestion];
            const questionTextForAudio = questionText.replace(/[*"().,:;?!-]/g, ' ').trim();
            console.log("Full question text on repeat:", questionText);
            startDynamicSubtitles(questionText);

            if (questionAudio) {
                questionAudio.pause();
                questionAudio.currentTime = 0;
                setTimeout(() => {
                    questionAudio.play().catch(err => {
                        console.error("Audio playback failed on repeat:", err);
                        alert("Audio playback failed on repeat: " + err.message + ". Please ensure your browser allows audio and supports WAV format.");
                    });
                }, 500);
            }
            questionAudio.onended = () => {
                aiAnimation.src = LISTENING_GIF;
                if (recognition) recognition.start();
                if (mediaRecorderAudio) mediaRecorderAudio.start();
                if (mediaRecorderVideo) mediaRecorderVideo.start();
            };
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (mediaRecorderAudio && mediaRecorderAudio.state === "recording") {
                mediaRecorderAudio.stop();
            }
            if (mediaRecorderVideo && mediaRecorderVideo.state === "recording") {
                mediaRecorderVideo.stop();
            }
            if (recognition && recognition.state === "recording") recognition.stop();
            if (subtitleInterval) clearInterval(subtitleInterval);

            isRecording = false;

            if (questionAudio) {
                questionAudio.pause();
                questionAudio.currentTime = 0;
            }

            const capturedAnswer = userAnswer || transcriptBar.textContent.trim() || "No response recorded";
            console.log(`Final captured user answer for question ${currentQuestion + 1}:`, capturedAnswer);

            showContainer('transition-container', 'transition-bg');

            setTimeout(() => {
                showContainer('interview-container', 'interview-bg');

                const audioFile = `${username}_q${currentQuestion + 1}_audio.webm`; // Note: Using .webm extension
                const videoFile = `${username}_q${currentQuestion + 1}_video.webm`;

                transcriptContent += `Question ${currentQuestion + 1}: ${questions[currentQuestion]}\n`;
                transcriptContent += `User Answer: ${capturedAnswer}\n`;
                transcriptContent += `AI Answer: ${aiAnswer}\n`;
                transcriptContent += `Domain: ${currentQuestion < 2 ? "Introduction" : currentQuestion < 5 ? "Resume-Based" : currentQuestion < 9 ? "Role-Specific" : currentQuestion < 12 ? "Behavioral" : "Situational"}\n`;
                transcriptContent += `Audio File: ${audioFile}\n`;
                transcriptContent += `Video File: ${videoFile}\n\n`;
                transcriptContent += `================================================================================\n\n`;

                const formData = new FormData();
                if (allAudioChunks[currentQuestion] && allAudioChunks[currentQuestion].length > 0) {
                    const audioBlob = new Blob(allAudioChunks[currentQuestion], { type: 'audio/webm;codecs=opus' });
                    if (audioBlob.size === 0) {
                        console.error(`Empty audio blob for question ${currentQuestion + 1}`);
                    } else {
                        formData.append('audio', audioBlob, audioFile);
                        console.log(`Audio saved for question ${currentQuestion + 1}, size: ${audioBlob.size}, type: ${audioBlob.type}`);
                        // Note: Server should convert this WebM to WAV for NLP analysis
                    }
                } else {
                    console.error(`No audio chunks recorded for question ${currentQuestion + 1}`);
                    formData.append('audio', new Blob(), audioFile); // Empty blob to indicate failure
                }
                if (allVideoChunks[currentQuestion] && allVideoChunks[currentQuestion].length > 0) {
                    const videoBlob = new Blob(allVideoChunks[currentQuestion], { type: 'video/webm' });
                    if (videoBlob.size === 0) {
                        console.error(`Empty video blob for question ${currentQuestion + 1}`);
                    } else {
                        formData.append('video', videoBlob, videoFile);
                        console.log(`Video saved for question ${currentQuestion + 1}, size: ${videoBlob.size}`);
                    }
                } else {
                    console.error(`No video chunks recorded for question ${currentQuestion + 1}`);
                }
                formData.append('transcript', transcriptContent);

                fetch(`/record_response/${sessionId}`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(result => {
                    if (result.status !== "success") {
                        console.error("Failed to record response:", result.error);
                        alert("Failed to record response: " + result.error);
                        showContainer('interview-container', 'interview-bg');
                        return;
                    }

                    transcriptBar.textContent = "";
                    userAnswer = "";
                    aiAnswer = "";
                    console.log("Reset transcriptBar.textContent and userAnswer for next question");
                    currentQuestion++;
                    loadQuestion();
                })
                .catch(err => {
                    console.error("Error recording response:", err);
                    alert("Error recording response: " + err.message);
                    showContainer('interview-container', 'interview-bg');
                });
            }, 2000);
        });

        function saveAllRecordings() {
            for (let i = 0; i < Math.min(questions.length, 15); i++) {
                const formData = new FormData();
                const audioFile = `${username}_q${i + 1}_audio.webm`;
                const videoFile = `${username}_q${i + 1}_video.webm`;

                if (allAudioChunks[i] && allAudioChunks[i].length > 0) {
                    const audioBlob = new Blob(allAudioChunks[i], { type: 'audio/webm;codecs=opus' });
                    if (audioBlob.size === 0) {
                        console.error(`Empty audio blob for question ${i + 1} during final save`);
                    } else {
                        formData.append('audio', audioBlob, audioFile);
                        console.log(`Final audio saved for question ${i + 1}, size: ${audioBlob.size}, type: ${audioBlob.type}`);
                        // Note: Server should convert this WebM to WAV for NLP analysis
                    }
                } else {
                    console.error(`No audio chunks for question ${i + 1} during final save`);
                    formData.append('audio', new Blob(), audioFile); // Empty blob to indicate failure
                }
                if (allVideoChunks[i] && allVideoChunks[i].length > 0) {
                    const videoBlob = new Blob(allVideoChunks[i], { type: 'video/webm' });
                    if (videoBlob.size === 0) {
                        console.error(`Empty video blob for question ${i + 1} during final save`);
                    } else {
                        formData.append('video', videoBlob, videoFile);
                        console.log(`Final video saved for question ${i + 1}, size: ${videoBlob.size}`);
                    }
                } else {
                    console.error(`No video chunks for question ${i + 1} during final save`);
                }
                formData.append('transcript', transcriptContent);

                fetch(`/record_response/${sessionId}`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(result => {
                    if (result.status !== "success") {
                        console.error(`Failed to save recording for question ${i + 1}:`, result.error);
                    }
                })
                .catch(err => {
                    console.error(`Error saving recording for question ${i + 1}:`, err);
                });
            }
        }
    </script>

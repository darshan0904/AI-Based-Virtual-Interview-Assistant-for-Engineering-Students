<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        .slide-in-right { animation: slideInRight 0.5s ease-out; }
        .slide-in-left { animation: slideInLeft 0.5s ease-out; }
        .hidden { display: none; }
        .neon-btn { @apply bg-gradient-to-r from-indigo-500 via-purple-500 to-teal-500 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:from-indigo-600 hover:via-purple-600 hover:to-teal-600 hover:scale-105 transition-all duration-300; }
        .neon-success-btn { @apply bg-gradient-to-r from-green-500 to-teal-500 text-white font-semibold py-3 px-6 rounded-xl shadow-lg hover:from-green-600 hover:to-teal-600 hover:scale-105 transition-all duration-300; }
        .loader { @apply border-4 border-t-teal-500 rounded-full w-12 h-12 animate-spin; }
        .pulse { animation: pulse 2s infinite; }
        .input-glow { @apply transition-all duration-300 focus:ring-2 focus:ring-teal-500 focus:border-teal-500; }
        .floating-label { @apply absolute left-3 top-3 text-gray-500 dark:text-gray-400 transition-all duration-300; }
        .input-filled .floating-label { @apply -top-2 text-sm text-teal-500; }
        .bg-pattern { background-image: linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.05) 75%, transparent 75%, transparent); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes slideInLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 font-inter transition-colors duration-300 bg-pattern">
    <!-- Theme Toggle -->
    <button id="theme-toggle" class="fixed top-4 right-4 p-2 rounded-full neon-btn hover:scale-105 transition-all">
        <svg id="sun-icon" class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <svg id="moon-icon" class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <!-- Form Container -->
    <div id="form-container" class="container mx-auto px-4 py-8 flex items-center justify-center min-h-screen">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md fade-in">
            <h1 class="text-4xl font-bold mb-8 text-center bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-teal-500">AI Interview Assistant</h1>
            <form id="interview-form" class="space-y-6">
                <div class="relative">
                    <input type="text" id="name" class="w-full p-3 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 input-glow peer" aria-label="Full Name">
                    <label for="name" class="floating-label">Your Name</label>
                </div>
                <div class="relative">
                    <select id="engineering" class="w-full p-3 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 input-glow peer" aria-label="Engineering Field">
                        <option value="" disabled selected>Select Engineering Field</option>
                        {% for field in engineering_fields %}
                            <option value="{{ field }}">{{ field }}</option>
                        {% endfor %}
                    </select>
                    <label for="engineering" class="floating-label">Engineering Field</label>
                </div>
                <div class="relative">
                    <select id="domain" class="w-full p-3 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 input-glow peer" aria-label="Domain">
                        <option value="" disabled selected>Select Domain</option>
                    </select>
                    <label for="domain" class="floating-label">Domain</label>
                    <input type="text" id="custom-domain" class="w-full p-3 mt-2 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 hidden input-glow" aria-label="Custom Domain" placeholder="Custom Domain">
                </div>
                <div class="relative">
                    <select id="role" class="w-full p-3 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 input-glow peer" aria-label="Role">
                        <option value="" disabled selected>Select Role</option>
                    </select>
                    <label for="role" class="floating-label">Role</label>
                    <input type="text" id="custom-role" class="w-full p-3 mt-2 rounded-lg border dark:border-gray-700 bg-gray-50 dark:bg-gray-900 hidden input-glow" aria-label="Custom Role" placeholder="Custom Role">
                </div>
                <div>
                    <input type="file" id="resume" accept=".pdf,.docx" class="hidden">
                    <label for="resume" id="resume-label" class="neon-btn flex items-center justify-center w-full cursor-pointer">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        Upload Resume (Optional)
                    </label>
                </div>
                <button type="submit" id="start-interview-btn" class="neon-btn w-full text-lg pulse">Start Interview</button>
            </form>
        </div>
    </div>

    <!-- Loading Container -->
    <div id="loading-container" class="container mx-auto px-4 py-8 flex items-center justify-center min-h-screen hidden">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl text-center slide-in-right">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-lg font-medium">Preparing Your Interview...</p>
        </div>
    </div>

    <!-- Transition Container -->
    <div id="transition-container" class="container mx-auto px-4 py-8 flex items-center justify-center min-h-screen hidden">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl text-center slide-in-left">
            <p class="text-lg font-medium">Please Wait...</p>
        </div>
    </div>

    <!-- Interview Container -->
    <div id="interview-container" class="container mx-auto px-4 py-8 min-h-screen hidden">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- AI Video -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-4 flex-1 slide-in-right overflow-hidden">
                <img id="ai-animation" src="/static/talking.gif" alt="AI Animation" class="w-full h-80 object-cover rounded-lg">
            </div>
            <!-- User Webcam -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-4 flex-1 overflow-hidden">
                <video id="user-video" autoplay class="w-full h-80 object-cover rounded-lg"></video>
            </div>
        </div>
        <!-- Control Panel -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-6 mt-6 flex items-center justify-between">
            <button id="repeat-btn" class="neon-btn flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.5v15m7.5-7.5h-15"></path>
                </svg>
                Repeat
            </button>
            <div id="transcript-bar" class="flex-1 mx-4 p-3 bg-gray-50 dark:bg-gray-900 rounded-lg text-center text-gray-700 dark:text-gray-300"></div>
            <button id="next-btn" class="neon-btn flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                Next
            </button>
        </div>
    </div>

    <!-- Thank You Container -->
    <div id="thank-you-container" class="container mx-auto px-4 py-8 flex items-center justify-center min-h-screen hidden">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl text-center slide-in-left">
            <h2 class="text-3xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-500 to-teal-500">Thank You!</h2>
            <p class="text-lg mb-6">"Success is not the absence of obstacles, but the courage to push through them."</p>
            <a href="#" id="eval-btn" class="neon-btn inline-flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Generate Evaluation
            </a>
        </div>
    </div>

    <script>
        const TALKING_GIF = "/static/talking.gif";
        const LISTENING_GIF = "/static/listening.gif";
        let sessionId, questions = [], currentQuestion = 0;
        let mediaRecorderAudio, mediaRecorderVideo;
        let allAudioChunks = [], allVideoChunks = [];
        let aiAnimation = document.getElementById('ai-animation');
        let transcriptBar = document.getElementById('transcript-bar');
        let userVideo = document.getElementById('user-video');
        let recognition;
        let questionAudio;
        let username, engineering, domain, role;
        let transcriptContent = "";
        let isRecording = false;
        let userAnswer = "";
        let aiAnswer = "";
        let subtitleInterval;
        let isProcessing = false;

        // Theme Toggle
        document.getElementById('theme-toggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden');
            document.getElementById('moon-icon').classList.toggle('hidden');
        });

        // Floating Label Logic
        document.querySelectorAll('.peer').forEach(input => {
            input.addEventListener('input', () => {
                const parent = input.parentElement;
                if (input.value || input.tagName === 'SELECT' && input.value) {
                    parent.classList.add('input-filled');
                } else {
                    parent.classList.remove('input-filled');
                }
            });
        });

        function hideAllContainers() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('loading-container').classList.add('hidden');
            document.getElementById('transition-container').classList.add('hidden');
            document.getElementById('interview-container').classList.add('hidden');
            document.getElementById('thank-you-container').classList.add('hidden');
        }

        function showContainer(containerId, animationClass) {
            hideAllContainers();
            const container = document.getElementById(containerId);
            container.classList.remove('hidden');
            container.classList.add(animationClass);
        }

        showContainer('form-container', 'fade-in');

        function isMimeTypeSupported(mimeType) {
            return MediaRecorder.isTypeSupported(mimeType);
        }

        function initWebcam() {
            navigator.mediaDevices.getUserMedia({
                video: true,
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true,
                    sampleRate: 44100,
                    channelCount: 1
                }
            })
            .then(stream => {
                const audioMimeType = 'audio/webm;codecs=opus';
                const videoMimeType = 'video/webm';
                if (!isMimeTypeSupported(audioMimeType)) {
                    console.error(`MIME type ${audioMimeType} not supported`);
                    alert("Your browser does not support the required audio format.");
                    return;
                }
                if (!isMimeTypeSupported(videoMimeType)) {
                    console.error(`MIME type ${videoMimeType} not supported`);
                    alert("Your browser does not support the required video format.");
                    return;
                }

                userVideo.srcObject = stream;

                const audioStream = new MediaStream(stream.getAudioTracks());
                mediaRecorderAudio = new MediaRecorder(audioStream, { 
                    mimeType: audioMimeType,
                    audioBitsPerSecond: 128000
                });
                mediaRecorderAudio.onstart = () => {
                    console.log(`Audio recording started for question ${currentQuestion + 1}, state: ${mediaRecorderAudio.state}`);
                };
                mediaRecorderAudio.ondataavailable = e => {
                    if (e.data.size > 0) {
                        if (!allAudioChunks[currentQuestion]) allAudioChunks[currentQuestion] = [];
                        allAudioChunks[currentQuestion].push(e.data);
                        console.log(`Audio chunk captured for question ${currentQuestion + 1}, size: ${e.data.size}, total chunks: ${allAudioChunks[currentQuestion].length}`);
                    } else {
                        console.warn(`Empty audio chunk received for question ${currentQuestion + 1}`);
                    }
                };
                mediaRecorderAudio.onstop = () => {
                    console.log(`Audio recording stopped for question ${currentQuestion + 1}, chunks: ${allAudioChunks[currentQuestion]?.length || 0}`);
                };
                mediaRecorderAudio.onerror = e => console.error(`Audio recorder error for question ${currentQuestion + 1}:`, e);

                const videoStream = new MediaStream(stream.getVideoTracks());
                mediaRecorderVideo = new MediaRecorder(videoStream, { 
                    mimeType: videoMimeType,
                    videoBitsPerSecond: 500000
                });
                mediaRecorderVideo.onstart = () => {
                    console.log(`Video recording started for question ${currentQuestion + 1}, state: ${mediaRecorderVideo.state}`);
                };
                mediaRecorderVideo.ondataavailable = e => {
                    if (e.data.size > 0) {
                        if (!allVideoChunks[currentQuestion]) allVideoChunks[currentQuestion] = [];
                        allVideoChunks[currentQuestion].push(e.data);
                        console.log(`Video chunk captured for question ${currentQuestion + 1}, size: ${e.data.size}, total chunks: ${allVideoChunks[currentQuestion].length}`);
                    } else {
                        console.warn(`Empty video chunk received for question ${currentQuestion + 1}`);
                    }
                };
                mediaRecorderVideo.onstop = () => {
                    console.log(`Video recording stopped for question ${currentQuestion + 1}, chunks: ${allVideoChunks[currentQuestion]?.length || 0}`);
                };
                mediaRecorderVideo.onerror = e => console.error(`Video recorder error for question ${currentQuestion + 1}:`, e);
            })
            .catch(err => {
                console.error("Webcam access failed:", err);
                alert("Please allow webcam and microphone access.");
            });
        }

        function initSpeechRecognition() {
            try {
                window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!window.SpeechRecognition) {
                    alert("Speech recognition not supported in this browser. Please use Chrome or Edge.");
                    return;
                }
                recognition = new window.SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;
                recognition.onstart = () => {
                    console.log(`Speech recognition started for question ${currentQuestion + 1}`);
                    isRecording = true;
                    userAnswer = "";
                    if (subtitleInterval) {
                        clearInterval(subtitleInterval);
                        subtitleInterval = null;
                        console.log("Cleared subtitle interval on speech recognition start");
                    }
                    transcriptBar.textContent = "Listening...";
                };
                recognition.onresult = event => {
                    let interimTranscript = '';
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        if (event.results[i].isFinal) {
                            finalTranscript += transcript + ' ';
                        } else {
                            interimTranscript += transcript;
                        }
                    }
                    userAnswer = finalTranscript.trim() || interimTranscript.trim();
                    transcriptBar.textContent = userAnswer || "Listening...";
                    console.log(`Speech result for question ${currentQuestion + 1} - Final: ${finalTranscript}, Interim: ${interimTranscript}`);
                };
                recognition.onerror = event => {
                    console.error(`Speech recognition error for question ${currentQuestion + 1}: ${event.error}`);
                    isRecording = false;
                    if (event.error === "no-speech") {
                        transcriptBar.textContent = "No speech detected, please try again.";
                        setTimeout(() => {
                            if (recognition && !isRecording) {
                                try {
                                    recognition.start();
                                    console.log(`Restarted speech recognition for question ${currentQuestion + 1}`);
                                } catch (e) {
                                    console.error("Failed to restart recognition:", e);
                                }
                            }
                        }, 1000);
                    } else {
                        transcriptBar.textContent = `Speech recognition error: ${event.error}`;
                    }
                };
                recognition.onend = () => {
                    console.log(`Speech recognition ended for question ${currentQuestion + 1}`);
                    isRecording = false;
                    if (!userAnswer) {
                        transcriptBar.textContent = "No response recorded.";
                    } else {
                        transcriptBar.textContent = userAnswer;
                    }
                };
            } catch (err) {
                console.error("Speech recognition initialization failed:", err);
                alert("Failed to initialize speech recognition.");
                recognition = null;
            }
        }

        function startDynamicSubtitles(text) {
            if (subtitleInterval) {
                clearInterval(subtitleInterval);
                subtitleInterval = null;
                console.log("Cleared existing subtitle interval");
            }
            const maxLength = 50;
            const words = text.split(' ');
            let chunks = [];
            let currentChunk = '';
            for (let word of words) {
                if ((currentChunk + word).length <= maxLength) {
                    currentChunk += (currentChunk ? ' ' : '') + word;
                } else {
                    if (currentChunk) chunks.push(currentChunk);
                    currentChunk = word;
                }
            }
            if (currentChunk) chunks.push(currentChunk);
            if (chunks.length === 0) {
                transcriptBar.textContent = text;
                console.log("No chunks created, displaying full text:", text);
                return;
            }
            let index = 0;
            transcriptBar.textContent = chunks[index];
            console.log(`Starting subtitles with ${chunks.length} chunks:`, chunks);
            if (chunks.length > 1) {
                subtitleInterval = setInterval(() => {
                    if (!subtitleInterval) return;
                    index = (index + 1) % chunks.length;
                    transcriptBar.textContent = chunks[index];
                    console.log(`Subtitle updated to chunk ${index + 1}/${chunks.length}: ${chunks[index]}`);
                }, 3000);
            }
        }

        document.getElementById('resume').addEventListener('change', (e) => {
            const file = e.target.files[0];
            const resumeLabel = document.getElementById('resume-label');
            if (file) {
                resumeLabel.textContent = `Resume: ${file.name}`;
                resumeLabel.classList.remove('neon-btn');
                resumeLabel.classList.add('neon-success-btn');
            } else {
                resumeLabel.textContent = 'Upload Resume (Optional)';
                resumeLabel.classList.remove('neon-success-btn');
                resumeLabel.classList.add('neon-btn');
            }
        });

        document.getElementById('engineering').addEventListener('change', (e) => {
            const engineering = e.target.value;
            const domainSelect = document.getElementById('domain');
            const customDomain = document.getElementById('custom-domain');
            const roleSelect = document.getElementById('role');
            const customRole = document.getElementById('custom-role');

            fetch('/get_domains', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ engineering })
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                return response.json();
            })
            .then(data => {
                domainSelect.innerHTML = '<option value="" disabled selected>Select Domain</option>' +
                    data.domains.map(domain => `<option value="${domain}">${domain}</option>`).join('') +
                    '<option value="custom">Custom Domain</option>';
                customDomain.classList.add('hidden');
                roleSelect.innerHTML = '<option value="" disabled selected>Select Role</option>';
                customRole.classList.add('hidden');
                domainSelect.parentElement.classList.add('input-filled');
            })
            .catch(err => {
                console.error("Error fetching domains:", err);
                alert("Failed to load domains.");
            });
        });

        document.getElementById('domain').addEventListener('change', (e) => {
            const domain = e.target.value;
            const roleSelect = document.getElementById('role');
            const customDomain = document.getElementById('custom-domain');
            const customRole = document.getElementById('custom-role');

            if (domain === 'custom') {
                customDomain.classList.remove('hidden');
                roleSelect.innerHTML = '<option value="custom" selected>Custom Role</option>';
                customRole.classList.remove('hidden');
            } else {
                customDomain.classList.add('hidden');
                customRole.classList.add('hidden');
                fetch('/get_roles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain })
                })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    return response.json();
                })
                .then(data => {
                    roleSelect.innerHTML = '<option value="" disabled selected>Select Role</option>' +
                        data.roles.map(role => `<option value="${role}">${role}</option>`).join('') +
                        '<option value="custom">Custom Role</option>';
                    roleSelect.parentElement.classList.add('input-filled');
                })
                .catch(err => {
                    console.error("Error fetching roles:", err);
                    alert("Failed to load roles.");
                });
            }
            e.target.parentElement.classList.add('input-filled');
        });

        document.getElementById('role').addEventListener('change', (e) => {
            const customRole = document.getElementById('custom-role');
            if (e.target.value === 'custom') {
                customRole.classList.remove('hidden');
            } else {
                customRole.classList.add('hidden');
            }
            e.target.parentElement.classList.add('input-filled');
        });

        document.getElementById('interview-form').addEventListener('submit', (e) => {
            e.preventDefault();
            showContainer('loading-container', 'slide-in-right');

            const formData = new FormData();
            username = document.getElementById('name').value;
            if (!username) {
                alert("Name is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            formData.append('name', username);

            engineering = document.getElementById('engineering').value;
            if (!engineering) {
                alert("Engineering field is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            formData.append('engineering', engineering);

            const domainSelect = document.getElementById('domain').value;
            if (!domainSelect) {
                alert("Domain is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            domain = domainSelect === 'custom' ? document.getElementById('custom-domain').value : domainSelect;
            if (domainSelect === 'custom' && !domain) {
                alert("Custom domain is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            formData.append('domain', domain);

            const roleSelect = document.getElementById('role').value;
            if (!roleSelect) {
                alert("Role is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            role = roleSelect === 'custom' ? document.getElementById('custom-role').value : roleSelect;
            if (roleSelect === 'custom' && !role) {
                alert("Custom role is required");
                showContainer('form-container', 'fade-in');
                return;
            }
            formData.append('role', role);

            const resume = document.getElementById('resume').files[0];
            if (resume) {
                formData.append('resume', resume);
            }

            fetch('/start_interview', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                return response.json();
            })
            .then(data => {
                sessionId = data.session_id;
                transcriptContent = `\t\t\t${username}\n\n`;
                allAudioChunks = [];
                allVideoChunks = [];
                return generateQuestions();
            })
            .then(() => {
                showContainer('interview-container', 'slide-in-right');
                initWebcam();
                initSpeechRecognition();
                loadQuestion();
            })
            .catch(err => {
                console.error("Error starting interview:", err);
                alert("Failed to start interview.");
                showContainer('form-container', 'fade-in');
            });
        });

        function generateQuestions() {
            return fetch(`/generate_questions/${sessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain: domain, role: role, has_resume: !!document.getElementById('resume').files[0] })
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                return response.json();
            })
            .then(data => {
                questions = data.questions.filter(q => q && !q.toLowerCase().includes("here are"));
                console.log("Questions loaded:", questions);
            })
            .catch(err => {
                console.error("Error generating questions:", err);
                alert("Failed to generate questions.");
                throw err;
            });
        }

        function loadQuestion() {
            if (currentQuestion >= questions.length || currentQuestion >= 15) {
                showContainer('thank-you-container', 'slide-in-left');
                cleanup();
                document.getElementById('eval-btn').href = `http://127.0.0.1:9999/`;
                return;
            }

            const questionText = questions[currentQuestion];
            console.log(`Loading question ${currentQuestion + 1}: ${questionText}`);
            aiAnimation.src = TALKING_GIF;
            isProcessing = true;

            if (questionAudio) {
                questionAudio.pause();
                questionAudio.currentTime = 0;
            }

            fetch(`/next_question/${sessionId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: questionText })
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                return response.json();
            })
            .then(data => {
                if (data.end) {
                    showContainer('thank-you-container', 'slide-in-left');
                    cleanup();
                    document.getElementById('eval-btn').href = `http://127.0.0.1:9999/`;
                    return;
                }

                aiAnswer = data.ai_answer;
                questionAudio = new Audio(data.audio);
                questionAudio.onloadeddata = () => {
                    startDynamicSubtitles(questionText);
                    questionAudio.play().catch(err => {
                        console.error("Audio playback failed:", err);
                        alert("Failed to play question audio.");
                        isProcessing = false;
                    });
                };
                questionAudio.onended = () => {
                    aiAnimation.src = LISTENING_GIF;
                    startRecording();
                };
            })
            .catch(err => {
                console.error("Error loading question:", err);
                alert("Failed to load question.");
                isProcessing = false;
            });
        }

        function startRecording() {
            if (!userVideo.srcObject) {
                console.error("Webcam stream lost, reinitializing...");
                initWebcam();
                setTimeout(startRecording, 1000);
                return;
            }
            if (recognition && !isRecording) {
                try {
                    recognition.start();
                } catch (e) {
                    console.error("Failed to start speech recognition:", e);
                    transcriptBar.textContent = "Speech recognition failed.";
                }
            }
            if (mediaRecorderAudio && mediaRecorderAudio.state !== "recording") {
                try {
                    mediaRecorderAudio.start(1000);
                    console.log(`Started audio recording for question ${currentQuestion + 1}`);
                } catch (e) {
                    console.error("Failed to start audio recording:", e);
                }
            }
            if (mediaRecorderVideo && mediaRecorderVideo.state !== "recording") {
                try {
                    mediaRecorderVideo.start(1000);
                    console.log(`Started video recording for question ${currentQuestion + 1}`);
                } catch (e) {
                    console.error("Failed to start video recording:", e);
                }
            }
            isProcessing = false;
        }

        function cleanup() {
            if (recognition && isRecording) {
                recognition.stop();
                console.log(`Stopped speech recognition for question ${currentQuestion + 1}`);
            }
            if (mediaRecorderAudio && mediaRecorderAudio.state === "recording") {
                mediaRecorderAudio.stop();
                console.log(`Stopped audio recording for question ${currentQuestion + 1}`);
            }
            if (mediaRecorderVideo && mediaRecorderVideo.state === "recording") {
                mediaRecorderVideo.stop();
                console.log(`Stopped video recording for question ${currentQuestion + 1}`);
            }
            if (subtitleInterval) {
                clearInterval(subtitleInterval);
                subtitleInterval = null;
                console.log("Cleared subtitle interval during cleanup");
            }
            if (questionAudio) {
                questionAudio.pause();
                questionAudio.currentTime = 0;
            }
        }

        document.getElementById('repeat-btn').addEventListener('click', () => {
            if (isProcessing) return;
            isProcessing = true;

            cleanup();
            aiAnimation.src = TALKING_GIF;
            const questionText = questions[currentQuestion];

            if (questionAudio) {
                questionAudio.currentTime = 0;
                questionAudio.onloadeddata = () => {
                    startDynamicSubtitles(questionText);
                    questionAudio.play().catch(err => {
                        console.error("Audio playback failed on repeat:", err);
                        alert("Failed to replay question.");
                        isProcessing = false;
                    });
                };
                questionAudio.onended = () => {
                    aiAnimation.src = LISTENING_GIF;
                    startRecording();
                };
                questionAudio.play().catch(err => {
                    console.error("Audio playback failed:", err);
                    isProcessing = false;
                });
            } else {
                isProcessing = false;
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (isProcessing) return;
            isProcessing = true;

            cleanup();

            const capturedAnswer = userAnswer || transcriptBar.textContent.trim() || "No response recorded";
            console.log(`Captured answer for question ${currentQuestion + 1}: ${capturedAnswer}`);
            console.log(`Audio chunks for question ${currentQuestion + 1}: ${allAudioChunks[currentQuestion]?.length || 0}`);
            console.log(`Video chunks for question ${currentQuestion + 1}: ${allVideoChunks[currentQuestion]?.length || 0}`);

            showContainer('transition-container', 'slide-in-left');

            setTimeout(() => {
                const sanitizedUsername = username
                    .toLowerCase()
                    .replace(/[^a-z0-9]/g, '_')
                    .replace(/_+/g, '_')
                    .replace(/^_+|_+$/g, '');
                const audioFile = `${sanitizedUsername}_${currentQuestion + 1}_audio.wav`;
                const videoFile = `${sanitizedUsername}_${currentQuestion + 1}_video.mp4`;

                transcriptContent += `Question ${currentQuestion + 1}: ${questions[currentQuestion]}\n`;
                transcriptContent += `User Answer: ${capturedAnswer}\n`;
                transcriptContent += `AI Answer: ${aiAnswer}\n`;
                transcriptContent += `Domain: ${currentQuestion < 2 ? "Introduction" : currentQuestion < 5 ? "Resume-Based" : currentQuestion < 9 ? "Role-Specific" : currentQuestion < 12 ? "Behavioral" : "Situational"}\n`;
                transcriptContent += `Audio File: ${audioFile}\n`;
                transcriptContent += `Video File: ${videoFile}\n\n`;
                transcriptContent += `================================================================================\n\n`;

                const formData = new FormData();
                let audioValid = false, videoValid = false;

                if (allAudioChunks[currentQuestion]?.length > 0) {
                    const audioBlob = new Blob(allAudioChunks[currentQuestion], { type: 'audio/webm;codecs=opus' });
                    if (audioBlob.size > 0) {
                        formData.append('audio', audioBlob, audioFile);
                        console.log(`Sending audio for question ${currentQuestion + 1}, size: ${audioBlob.size}, filename: ${audioFile}`);
                        audioValid = true;
                    } else {
                        console.warn(`Audio blob is empty for question ${currentQuestion + 1}`);
                    }
                } else {
                    console.warn(`No audio chunks for question ${currentQuestion + 1}`);
                }
                if (!audioValid) {
                    formData.append('audio', new Blob(), audioFile);
                    console.log(`Sending empty audio placeholder for question ${currentQuestion + 1}, filename: ${audioFile}`);
                }

                if (allVideoChunks[currentQuestion]?.length > 0) {
                    const videoBlob = new Blob(allVideoChunks[currentQuestion], { type: 'video/webm' });
                    if (videoBlob.size > 0) {
                        formData.append('video', videoBlob, videoFile);
                        console.log(`Sending video for question ${currentQuestion + 1}, size: ${videoBlob.size}, filename: ${videoFile}`);
                        videoValid = true;
                    } else {
                        console.warn(`Video blob is empty for question ${currentQuestion + 1}`);
                    }
                } else {
                    console.warn(`No video chunks for question ${currentQuestion + 1}`);
                }
                if (!videoValid) {
                    formData.append('video', new Blob(), videoFile);
                    console.log(`Sending empty video placeholder for question ${currentQuestion + 1}, filename: ${videoFile}`);
                }

                formData.append('transcript', capturedAnswer);

                fetch(`/record_response/${sessionId}/${currentQuestion + 1}`, {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(err => { throw new Error(`HTTP error ${response.status}: ${err.error}`); });
                    }
                    return response.json();
                })
                .then(result => {
                    if (result.status !== "success") {
                        console.error("Failed to record response:", result.error);
                        alert("Failed to record response: " + result.error);
                        showContainer('interview-container', 'slide-in-right');
                        isProcessing = false;
                        return;
                    }

                    console.log(`Response recorded successfully for question ${currentQuestion + 1}`);

                    transcriptBar.textContent = "";
                    userAnswer = "";
                    aiAnswer = "";
                    allAudioChunks[currentQuestion] = [];
                    allVideoChunks[currentQuestion] = [];
                    currentQuestion++;
                    showContainer('interview-container', 'slide-in-right');
                    loadQuestion();
                })
                .catch(err => {
                    console.error("Error recording response:", err);
                    alert("Error recording response: " + err.message);
                    showContainer('interview-container', 'slide-in-right');
                    isProcessing = false;
                });
            }, 2000);
        });

        function saveAllRecordings() {
            console.log("saveAllRecordings called but not needed, as recordings are saved after each question.");
        }
    </script>
</body>
</html>
